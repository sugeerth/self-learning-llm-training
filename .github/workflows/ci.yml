name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test deps (torch CPU for the arms-logic tests)
        run: |
          pip install numpy pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Run tests
        run: pytest tests/ -q
